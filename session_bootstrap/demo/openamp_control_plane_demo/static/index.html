<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OpenAMP 控制面演示看板</title>
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <div class="background-glow glow-a"></div>
  <div class="background-glow glow-b"></div>
  <main class="shell">
    <section class="hero panel">
      <div class="hero-copy">
        <p class="eyebrow">答辩演示总览</p>
        <h1>一屏查看 OpenAMP 控制面状态、FIT 证据与性能结果。</h1>
        <p class="lede" id="heroSummary">正在加载仓库内证据快照...</p>
        <div class="actions">
          <button id="reloadButton" class="button button-primary" type="button">刷新证据</button>
          <button id="probeButton" class="button button-secondary" type="button">读取当前板卡状态</button>
        </div>
      </div>
      <div class="hero-side">
        <div class="mode-card card">
          <div class="label">展示模式</div>
          <div class="mode-pill" id="modePill">准备中</div>
          <p id="modeSummary">正在等待快照。</p>
        </div>
        <div class="metric-strip" id="topStats"></div>
      </div>
    </section>

    <section class="grid-two">
      <article class="panel board-panel">
        <div class="section-head">
          <div>
            <p class="eyebrow">板卡与控制面</p>
            <h2>证据状态与当前读数</h2>
          </div>
          <span class="muted" id="generatedAt"></span>
        </div>
        <div id="boardEvidenceCard"></div>
        <div id="boardLiveCard" class="board-live-card"></div>
      </article>

      <article class="panel panel-stack">
        <div class="section-head">
          <div>
            <p class="eyebrow">操作入口</p>
            <h2>启动命令与说明范围</h2>
          </div>
        </div>
        <div id="launchCommands" class="launch-list"></div>
        <div class="mini-grid">
          <div class="card" id="hostSideCard"></div>
          <div class="card" id="slaveSideCard"></div>
        </div>
      </article>
    </section>

    <section class="panel">
        <div class="section-head">
          <div>
            <p class="eyebrow">关键里程碑</p>
            <h2>OpenAMP 最小闭环证据</h2>
          </div>
        </div>
      <div id="milestonesGrid" class="timeline-grid"></div>
    </section>

    <section class="grid-two">
      <article class="panel">
        <div class="section-head">
          <div>
            <p class="eyebrow">FIT 状态</p>
            <h2>正式收口结果</h2>
          </div>
        </div>
        <div id="fitGrid" class="fit-grid"></div>
      </article>

      <article class="panel">
        <div class="section-head">
          <div>
            <p class="eyebrow">性能定位</p>
            <h2>trusted current 对齐情况</h2>
          </div>
        </div>
        <p id="performanceNote" class="lede compact"></p>
        <div id="performanceGrid" class="performance-grid"></div>
      </article>
    </section>

    <section class="panel">
        <div class="section-head">
          <div>
            <p class="eyebrow">材料索引</p>
            <h2>主文档与脚本</h2>
          </div>
        </div>
      <div id="sourcesGrid" class="sources-grid"></div>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
